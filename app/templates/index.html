<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <nav class="tabs">
            <button class="tab active" data-tab="chat">Chat</button>
            <button class="tab" data-tab="tasks">Tasks</button>
        </nav>

        <div id="chat" class="panel active">
            <div id="messages" class="messages"></div>
            <form id="chat-form" class="chat-input">
                <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>

        <div id="tasks" class="panel">
            <form id="add-task-form" class="add-task">
                <input type="text" id="task-name" placeholder="Task name" required>
                <div class="freq-group">
                    <input type="number" id="task-freq" placeholder="#" min="1" required>
                    <select id="task-unit">
                        <option value="1">days</option>
                        <option value="7">weeks</option>
                        <option value="30">months</option>
                    </select>
                </div>
                <button type="submit">Add</button>
            </form>
            <div id="task-list" class="task-list"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
